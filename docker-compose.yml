services:
  postgres:
    image: postgres:16
    container_name: innovationlink-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: hospital_erp
    # Host port 5433 to avoid clashing with any Postgres already on 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospital_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
